[PHP]
; ========================================
; WinCMP 通用 PHP 設定檔
; ========================================
;
; 此檔案由 WinCMP 統一管理，適用於所有 PHP 版本。
; 所有路徑均使用「相對路徑」（相對於專案根目錄，即 CWD）。
;
; extension_dir 不在此檔案中設定，而是由啟動指令透過
; -d extension_dir=<php_dir>/ext 動態注入，以支援多版本共存。
;
; 使用方式：
;   php-cgi.exe -c conf\php\php.ini -d extension_dir=bin\php\php-X.X.XX\ext -b 127.0.0.1:PORT
;

; === 資源限制 ===
max_execution_time = 36000
max_input_time = 60
memory_limit = 512M

; === 錯誤處理與日誌 ===
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
error_log = "logs/php_errors.log"
report_memleaks = On

; === 資料處理 ===
variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
auto_globals_jit = On
post_max_size = 2G
default_mimetype = "text/html"
default_charset = "UTF-8"

; === 檔案上傳 ===
file_uploads = On
upload_max_filesize = 2G
max_file_uploads = 20

; === 網路 ===
allow_url_fopen = On
allow_url_include = Off
default_socket_timeout = 60

; === 擴充模組 ===
; 注意：extension_dir 由啟動指令的 -d 參數動態注入
extension=curl
extension=fileinfo
extension=gd
extension=intl
extension=mbstring
extension=exif      ; 必須在 mbstring 之後載入
extension=mysqli
extension=openssl
extension=pdo_mysql
extension=pdo_sqlite
extension=sodium
extension=sqlite3
extension=xsl

; === CLI Server ===
[CLI Server]
cli_server.color = On

; === Session ===
[Session]
session.save_handler = files
session.save_path = "tmp"
session.use_strict_mode = 0
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.auto_start = 0
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 1440
session.cache_limiter = nocache
session.cache_expire = 180

; === MySQLi ===
[MySQLi]
mysqli.max_persistent = -1
mysqli.allow_persistent = On
mysqli.max_links = -1
mysqli.default_port = 3306
mysqli.default_socket =
mysqli.default_host =
mysqli.default_user =
mysqli.default_pw =

[mysqlnd]
mysqlnd.collect_statistics = On
mysqlnd.collect_memory_statistics = On

; === PDO MySQL ===
[Pdo_mysql]
pdo_mysql.default_socket=

; === ODBC ===
[ODBC]
odbc.allow_persistent = On
odbc.check_persistent = On
odbc.max_persistent = -1
odbc.max_links = -1
odbc.defaultlrl = 4096
odbc.defaultbinmode = 1

; === Mail ===
[mail function]
SMTP = localhost
smtp_port = 25
mail.add_x_header = Off
mail.mixed_lf_and_crlf = Off

; === SSL ===
[openssl]
openssl.cafile = "conf/ssl/cacert.pem"
[curl]
curl.cainfo = "conf/ssl/cacert.pem"